openapi: 3.0.3
info:
  title: Music Player API
  version: 1.0.0
  description: Backend API for student music player app.
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/history/:
    get:
      operationId: history_list
      tags:
      - history
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayHistory'
          description: ''
  /api/liked/:
    get:
      operationId: liked_list
      tags:
      - liked
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Track'
          description: ''
  /api/playlists/:
    get:
      operationId: playlists_list
      tags:
      - playlists
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Playlist'
          description: ''
    post:
      operationId: playlists_create
      tags:
      - playlists
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Playlist'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Playlist'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Playlist'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
          description: ''
  /api/playlists/{id}/:
    get:
      operationId: playlists_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - playlists
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistDetail'
          description: ''
    put:
      operationId: playlists_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - playlists
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Playlist'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Playlist'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Playlist'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
          description: ''
    patch:
      operationId: playlists_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - playlists
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPlaylist'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPlaylist'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPlaylist'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
          description: ''
    delete:
      operationId: playlists_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - playlists
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/playlists/{id}/add_track/:
    post:
      operationId: playlists_add_track_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - playlists
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddRemoveTrack'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddRemoveTrack'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddRemoveTrack'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistDetail'
          description: ''
  /api/playlists/{id}/remove_track/:
    delete:
      operationId: playlists_remove_track_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - playlists
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Track removed
  /api/recommendations/:
    get:
      operationId: recommendations_list
      tags:
      - recommendations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Track'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/tracks/:
    get:
      operationId: tracks_list
      tags:
      - tracks
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Track'
          description: ''
  /api/tracks/{id}/:
    get:
      operationId: tracks_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tracks
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Track'
          description: ''
  /api/tracks/{id}/like/:
    post:
      operationId: tracks_like_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tracks
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Like toggled
  /api/tracks/{id}/play/:
    post:
      operationId: tracks_play_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tracks
      security:
      - jwtAuth: []
      responses:
        '201':
          description: Play logged
  /api/tracks/{id}/preview/:
    get:
      operationId: tracks_preview_retrieve
      description: Testing endpoint that returns the current Deezer preview URL as
        JSON.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tracks
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Returns current Deezer preview URL
        '403':
          description: Available only in DEBUG mode
        '404':
          description: Track preview is unavailable
  /api/tracks/{id}/stream/:
    get:
      operationId: tracks_stream_retrieve
      description: Resolve a playable URL for a track at request time and redirect
        the browser there.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tracks
      security:
      - jwtAuth: []
      responses:
        '302':
          description: Redirects to a playable audio URL
        '404':
          description: Track preview is unavailable
  /api/tracks/import/:
    post:
      operationId: tracks_import_create
      description: Import one Deezer track (preview URL) into local Track catalog.
      tags:
      - tracks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeezerTrackImport'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeezerTrackImport'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeezerTrackImport'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Track'
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Track'
          description: ''
  /api/tracks/search/:
    get:
      operationId: tracks_search_list
      description: Search Deezer, upsert preview tracks into local DB, and return
        local tracks with IDs.
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Max number of results (1-10). Defaults to 10.
      - in: query
        name: q
        schema:
          type: string
        description: Search text sent to Deezer (track or artist name).
        required: true
      tags:
      - tracks
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Track'
          description: ''
components:
  schemas:
    AddRemoveTrack:
      type: object
      properties:
        track_id:
          type: integer
      required:
      - track_id
    DeezerTrackImport:
      type: object
      properties:
        deezer_id:
          type: integer
          minimum: 1
      required:
      - deezer_id
    GenreEnum:
      enum:
      - pop
      - rock
      - jazz
      - classical
      - hiphop
      - electronic
      - other
      type: string
      description: |-
        * `pop` - Pop
        * `rock` - Rock
        * `jazz` - Jazz
        * `classical` - Classical
        * `hiphop` - Hip Hop
        * `electronic` - Electronic
        * `other` - Other
    PatchedPlaylist:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        track_count:
          type: integer
          readOnly: true
    PlayHistory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        track:
          allOf:
          - $ref: '#/components/schemas/Track'
          readOnly: true
        played_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - played_at
      - track
    Playlist:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        track_count:
          type: integer
          readOnly: true
      required:
      - created_at
      - id
      - name
      - track_count
    PlaylistDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        tracks:
          type: string
          readOnly: true
      required:
      - created_at
      - id
      - name
      - tracks
      - updated_at
    Register:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 8
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 1000
      required:
      - email
      - password
      - username
    SourceEnum:
      enum:
      - local
      - deezer
      type: string
      description: |-
        * `local` - Local
        * `deezer` - Deezer
    TokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - email
      - password
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    Track:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        artist:
          type: string
          maxLength: 255
        source:
          allOf:
          - $ref: '#/components/schemas/SourceEnum'
          default: local
        external_id:
          type: string
          nullable: true
          maxLength: 64
        is_preview_only:
          type: boolean
        genre:
          $ref: '#/components/schemas/GenreEnum'
        duration:
          type: integer
          maximum: 2147483647
          minimum: 0
        cover_url:
          type: string
          format: uri
          nullable: true
          maxLength: 1000
        stream_url:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - artist
      - created_at
      - duration
      - genre
      - id
      - stream_url
      - title
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 1000
      required:
      - email
      - id
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
